<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says Game</title>
    <link rel="stylesheet" href="simon.css" />
</head>

<body>
    <h1>Simon Says Game</h1>
    <h2>Press any key to start.</h2>
    <h3></h3>
    <div class="box-container">
        <div class="line-one">
            <div class="box green" id="green" type="bottun"></div>
            <div class="box red" id="red" type="bottun"></div>
        </div>
        <div class="line-two">
            <div class="box blue" id="blue" type="bottun"></div>
            <div class="box yellow" id="yellow" type="bottun"></div>
        </div>
    </div>
    <script src="samon.js"></script>
</body>

</html>
